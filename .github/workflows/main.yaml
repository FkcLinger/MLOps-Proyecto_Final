name: MLOps Pipeline Renovacion Prestamos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Fase 1: Integridad de Datos y API
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas unitarias (Pytest)
        run: pytest

  # Fase 2: Entrenamiento y Puerta de Calidad
  train-and-validate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Entrenar el modelo
        run: python src/train.py

      - name: Validar Métrica de Negocio (Quality Gate)
        run: python src/validate.py

  # Fase 3: Contenerización (Requisito Sesión 7)
  build-and-smoke-test:
    needs: train-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Entrenar para generar artefactos en este entorno
        run: |
          pip install -r requirements.txt
          python src/train.py

      - name: Construir Imagen Docker (Build)
        run: docker build -t prestamo-api:latest .

      - name: Smoke Test exigido
        run: docker run --rm prestamo-api:latest